name: Generate IAM Changelog

on:
  schedule:
    - cron: '0 16 * * *'   # Daily at 16:00 UTC (after iam-dataset updates ~14:00 UTC)
  workflow_dispatch:         # Allow manual trigger

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Clone iam-dataset (last 60 commits for 30-day window)
        run: git clone --depth=60 https://github.com/iann0036/iam-dataset.git

      - name: Generate changelog
        run: |
          python generate_changelog.py \
            --dataset-path ./iam-dataset \
            --output-dir   ./docs \
            --days         30 \
            --page-size    100

      - name: Copy static assets to docs/
        run: cp static/index.html static/script.js static/style.css docs/

      - name: Commit and push generated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "chore: update changelog $(date -u +%Y-%m-%d)"
          git push

  deploy:
    needs: generate
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout repository (with generated data)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
